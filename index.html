<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Flow | Depósito Profissional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --border: #2f3336;
            --primary: #fcd535; --text: #eaecef; --muted: #848e9c;
            --success: #0ecb81; --danger: #f6465d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 480px; margin: 0 auto; }

        header { margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 15px; }
        h1 { font-size: 20px; font-weight: 700; }
        .subtitle { font-size: 12px; color: var(--muted); }

        .card { 
            background: var(--card); border-radius: 12px; padding: 16px; 
            margin-bottom: 12px; border: 1px solid var(--border);
        }

        h3 { font-size: 11px; margin-bottom: 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%; padding: 14px; background: #2b3139; border: 1px solid transparent;
            border-radius: 8px; color: #fff; font-size: 15px; margin-top: 5px;
        }
        input:focus { outline: none; border-color: var(--primary); }

        /* Grids Dinâmicos */
        .grid-methods { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-opt {
            padding: 12px 10px; background: #2b3139; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); cursor: pointer; font-size: 12px;
            transition: 0.2s; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-opt:hover { border-color: var(--muted); }
        .btn-opt.active { border-color: var(--primary); color: var(--primary); background: rgba(252, 213, 53, 0.1); }

        /* Preview de Valor */
        .preview-box {
            background: rgba(252, 213, 53, 0.05); border: 1px dashed var(--primary);
            padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px;
        }
        .preview-box span { font-family: monospace; font-size: 24px; font-weight: 700; color: var(--primary); }

        /* Área de Dados Finais */
        .data-card {
            background: #0b0e11; padding: 15px; border-radius: 10px; margin-top: 15px;
            border: 1px solid var(--border); animation: slideUp 0.3s ease;
        }
        .label-small { font-size: 10px; color: var(--muted); margin-bottom: 5px; display: block; }
        .data-val { font-family: monospace; font-size: 14px; color: #fff; word-break: break-all; margin-bottom: 10px; display: block; }
        
        .copy-btn {
            width: 100%; padding: 10px; background: transparent; border: 1px solid var(--primary);
            color: var(--primary); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700;
        }

        /* Botão de Envio */
        .main-btn {
            width: 100%; padding: 18px; background: var(--primary); color: #000;
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            margin-top: 15px; font-size: 15px; transition: 0.3s;
        }
        .main-btn:disabled { background: #2b3139; color: var(--muted); cursor: not-allowed; border: 1px solid var(--border); }

        /* Orders */
        .order-item { background: #2b3139; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--muted); }
        .status-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .status-pendente { background: rgba(252, 213, 53, 0.2); color: var(--primary); }
        .status-concluido { background: rgba(14, 203, 129, 0.2); color: var(--success); }

        .hidden { display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loading-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999;
        }
    </style>
</head>
<body>

<div id="loader_screen" class="loading-overlay hidden">
    <div style="width: 40px; height: 40px; border: 4px solid var(--primary); border-top-color: transparent; border-radius: 50%; animate: spin 1s linear infinite;"></div>
    <p id="loader_text" style="margin-top: 15px; color: var(--primary); font-weight: 600;">Processando...</p>
</div>

<div class="container">
    <header>
        <h1>Portal de Pagamentos</h1>
        <p class="subtitle">Depósito Seguro • Angola & Crypto</p>
    </header>

    <div class="card">
        <h3>1. Valor do Depósito</h3>
        <input id="u_amount" type="text" inputmode="decimal" placeholder="0.00" oninput="handleValue()">
        <div class="preview-box">
            <span id="final_amt">0.00</span>
        </div>
    </div>

    <div class="card">
        <h3>2. Método de Pagamento</h3>
        <div class="grid-methods" id="main_grid">
            </div>

        <div id="sub_section" class="hidden fade" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
            <h3 id="sub_title">Selecione uma opção</h3>
            <div class="grid-methods" id="sub_grid"></div>
        </div>

        <div id="final_data" class="hidden fade data-card">
            <span id="final_label" class="label-small">DADOS DE DESTINO</span>
            <span id="final_value" class="data-val">---</span>
            <button class="copy-btn" onclick="copyData()">Copiar Dados</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Identificação e Comprovante</h3>
        <input id="u_name" placeholder="Nome Completo">
        <input id="u_email" placeholder="E-mail de Cadastro">
        <div style="margin-top: 10px;">
            <label class="label-small">FOTO DO COMPROVANTE (PNG/JPG)</label>
            <input id="u_file" type="file" accept="image/*" style="border:none; padding: 0; background:none;">
        </div>
        <button id="submit_btn" class="main-btn" disabled onclick="processAll()">FINALIZAR DEPÓSITO</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3>Minhas Ordens</h3>
            <button onclick="refreshHistory()" style="background:none; border:none; color:var(--primary); font-size:10px; font-weight:700; cursor:pointer">ATUALIZAR</button>
        </div>
        <div id="history_list"></div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    emailjs.init("7Kf1togYs_MepnGuW");
    const CONFIG = {
        scriptURL: "https://script.google.com/macros/s/AKfycbwLd5_ju--UGjgvS1Je4hRDL2MJhC3fB-uMjk7oBzhKdUSTG822rCx10MDLtBYl_1o33Q/exec",
        imgbbKey: "0df1b15bfc20421c269deb216af4713b"
    };

    // --- ESTRUTURA DE DADOS ---
    const METHODS = {
        usdt: { name: "USDT", type: "crypto", nets: { "TRC20": "TxxxxxxTRC20", "BEP20": "0xxxxxxBEP20" } },
        btc: { name: "Bitcoin", type: "direct", val: "bc1qxxxxxxBTC" },
        iban: { 
            name: "Transferência", type: "bank", 
            banks: { 
                "BAI": "AO06.0040.0000.XXXX", 
                "BFA": "AO06.0006.0000.XXXX", 
                "ATLANTICO": "AO06.0001.0000.XXXX",
                "BIC": "AO06.0051.0000.XXXX"
            } 
        },
        mcx: { name: "Express", type: "direct", val: "942515887 (Referência)" },
        money: { name: "Unitel Money", type: "direct", val: "923xxxxxx" }
    };

    let state = {
        val: "0.00",
        suffix: "",
        method: null,
        subOption: null,
        data: null
    };

    // --- LÓGICA DE INTERFACE ---
    function handleValue() {
        let v = document.getElementById("u_amount").value.replace(',','.').replace(/[^0-9.]/g,'');
        if(!state.suffix) state.suffix = Math.floor(Math.random() * 899) + 100;
        state.val = v ? parseFloat(v).toLocaleString('pt-PT') + "," + state.suffix : "0.00";
        document.getElementById("final_amt").innerText = state.val;
        validateForm();
    }

    function initMethods() {
        const grid = document.getElementById("main_grid");
        Object.keys(METHODS).forEach(key => {
            let btn = document.createElement("button");
            btn.className = "btn-opt";
            btn.innerText = METHODS[key].name;
            btn.onclick = () => selectMethod(key, btn);
            grid.appendChild(btn);
        });
        refreshHistory();
    }

    function selectMethod(key, btn) {
        // Reset Progressivo
        state.method = key;
        state.subOption = null;
        state.data = null;
        
        document.querySelectorAll("#main_grid .btn-opt").forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById("sub_section").classList.add("hidden");
        document.getElementById("final_data").classList.add("hidden");

        const m = METHODS[key];
        if(m.type === "crypto") {
            showSub("Selecione a Rede", m.nets);
        } else if(m.type === "bank") {
            showSub("Selecione o Banco", m.banks);
        } else {
            showFinalData(m.name, m.val);
        }
        validateForm();
    }

    function showSub(title, options) {
        const subGrid = document.getElementById("sub_grid");
        subGrid.innerHTML = "";
        document.getElementById("sub_title").innerText = title;
        document.getElementById("sub_section").classList.remove("hidden");

        Object.keys(options).forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "btn-opt";
            btn.innerText = opt;
            btn.onclick = () => {
                document.querySelectorAll("#sub_grid .btn-opt").forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.subOption = opt;
                showFinalData(opt, options[opt]);
            };
            subGrid.appendChild(btn);
        });
    }

    function showFinalData(label, val) {
        state.data = val;
        document.getElementById("final_data").classList.remove("hidden");
        document.getElementById("final_label").innerText = "DESTINO: " + label;
        document.getElementById("final_value").innerText = val;
        validateForm();
    }

    function copyData() {
        navigator.clipboard.writeText(state.data);
        alert("Copiado com sucesso!");
    }

    function validateForm() {
        const name = document.getElementById("u_name").value;
        const email = document.getElementById("u_email").value;
        const file = document.getElementById("u_file").files.length;
        const btn = document.getElementById("submit_btn");

        // Regra de Ouro: Valor + Método + (Subopção se houver) + Dados Pessoais
        const hasSub = (METHODS[state.method]?.type === "crypto" || METHODS[state.method]?.type === "bank");
        const subValid = hasSub ? !!state.subOption : true;

        if(state.val !== "0.00" && state.method && subValid && name && email && file) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }

    // Ouvintes de input para validação em tempo real
    document.getElementById("u_name").oninput = validateForm;
    document.getElementById("u_email").oninput = validateForm;
    document.getElementById("u_file").onchange = validateForm;

    // --- PROCESSAMENTO FINAL ---
    async function processAll() {
        const loader = document.getElementById("loader_screen");
        const loaderTxt = document.getElementById("loader_text");
        loader.classList.remove("hidden");

        try {
            // 1. Upload ImgBB
            loaderTxt.innerText = "⏳ Enviando comprovante...";
            let fd = new FormData();
            fd.append("image", document.getElementById("u_file").files[0]);
            let resImg = await fetch(`https://api.imgbb.com/1/upload?key=${CONFIG.imgbbKey}`, { method: "POST", body: fd });
            let imgJson = await resImg.json();
            const urlImg = imgJson.data.url;

            // 2. Planilha Google
            loaderTxt.innerText = "📊 Registrando ordem...";
            const payload = {
                id: Date.now().toString(),
                nome: document.getElementById("u_name").value,
                email: document.getElementById("u_email").value,
                valor: state.val,
                metodo: METHODS[state.method].name + (state.subOption ? " ("+state.subOption+")" : ""),
                comprovante: urlImg
            };

            await fetch(CONFIG.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

            // 3. Notificação Email
            loaderTxt.innerText = "📧 Notificando administração...";
            await emailjs.send("service_c6pxohd", "template_cc591m9", {
                name: payload.nome,
                email: payload.email,
                amount: payload.valor,
                method: payload.metodo,
                img_url: urlImg
            });

            localStorage.setItem("last_user_email", payload.email);
            alert("✅ DEPÓSITO SOLICITADO!\nAguarde a confirmação em seu histórico.");
            location.reload();

        } catch (e) {
            alert("❌ Erro no processo. Tente novamente.");
            loader.classList.add("hidden");
        }
    }

    async function refreshHistory() {
        const email = localStorage.getItem("last_user_email");
        if(!email) return;
        
        const list = document.getElementById("history_list");
        list.innerHTML = "<p style='text-align:center; font-size:10px; color:var(--muted)'>Sincronizando...</p>";

        try {
            const res = await fetch(`${CONFIG.scriptURL}?email=${email}`);
            const data = await res.json();
            
            if(data.length === 0) {
                list.innerHTML = "<p style='text-align:center; font-size:10px;'>Nenhuma ordem encontrada.</p>";
                return;
            }

            list.innerHTML = data.reverse().map(o => `
                <div class="order-item">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-weight:600; font-size:12px">${o.metodo}</span>
                        <span class="status-tag status-${o.status.toLowerCase().replace('ú','u')}">${o.status}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:5px">
                        <span style="color:var(--primary); font-weight:700">${o.valor}</span>
                        <span>${new Date(o.data).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = "<p style='text-align:center; font-size:10px;'>E-mail não encontrado ou erro de rede.</p>";
        }
    }

    initMethods();
</script>

</body>
</html>
